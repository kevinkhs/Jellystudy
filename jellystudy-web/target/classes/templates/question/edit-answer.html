<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="layout :: head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑回答 - JellyStudy</title>
</head>
<body>

<!-- Header Navigation -->
<div th:replace="layout :: header"></div>

<!-- ========== PAGE HERO ========== -->
<section class="page-hero">
    <div class="container">
        <a th:href="@{/question/{id}(id=${questionId})}" class="back-link">&larr; 返回问题详情</a>
        <h1>编辑回答</h1>
    </div>
</section>

<!-- ========== EDIT FORM ========== -->
<section class="py-12">
    <div class="container" style="max-width:800px;">
        <div class="card animate-slide-up" style="padding:32px;">
            <h2 style="font-size:1.5rem; font-weight:bold; color:var(--text-primary); margin-bottom:24px;">编辑回答内容</h2>

            <!-- Original Content Preview -->
            <div style="background:var(--bg-secondary); padding:16px; border-radius:12px; margin-bottom:24px; border-left:4px solid var(--color-primary);">
                <p style="font-size:13px; color:var(--text-muted); margin-bottom:6px;">原始内容：</p>
                <p style="color:rgba(232,232,240,0.85); line-height:1.7;" th:text="${answer.content}"></p>
            </div>

            <form th:action="@{/question/{qid}/answer/{aid}/update(qid=${questionId}, aid=${answer.id})}" method="post">
                <div class="form-group">
                    <label class="form-label">新回答内容</label>
                    <textarea name="content" class="form-control form-textarea-lg" required
                              th:text="${answer.content}" placeholder="输入新的回答内容..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">昵称</label>
                    <input type="text" name="author" class="form-control" required
                           th:value="${answer.author}" placeholder="你的昵称"/>
                </div>
                <div style="display:flex; gap:12px; margin-top:24px;">
                    <button type="submit" class="btn btn-primary btn-lg">保存修改</button>
                    <a th:href="@{/question/{id}(id=${questionId})}" class="btn btn-outline btn-lg">取消</a>
                </div>
            </form>
        </div>
    </div>
</section>

</body>
</html>
