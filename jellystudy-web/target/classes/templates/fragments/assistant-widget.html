<!-- AI 助手悬浮窗组件 - v0 设计 -->
<div id="ai-assistant-widget" th:fragment="assistant-widget">

    <!-- 悬浮按钮 -->
    <button id="assistant-toggle" onclick="toggleAssistant()"
            style="position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; align-items:center; justify-content:center; width:64px; height:64px; border-radius:50%; border:none; cursor:pointer;
                   background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; box-shadow:0 4px 15px rgba(102,126,234,0.4);
                   transition:all 0.3s ease; animation:pulseGlow 3s ease-in-out infinite;"
            onmouseover="if(!isPanelOpen){this.style.transform='scale(1.1)';this.style.boxShadow='0 6px 25px rgba(102,126,234,0.6)'}"
            onmouseout="if(!isPanelOpen){this.style.transform='';this.style.boxShadow='0 4px 15px rgba(102,126,234,0.4)'}">
        <!-- Sparkles 图标 -->
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:bounceSubtle 2s ease-in-out infinite;">
            <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
            <path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/>
        </svg>
        <!-- 通知红点 -->
        <span style="position:absolute; top:-3px; right:-3px; display:flex;">
            <span style="display:inline-flex; width:12px; height:12px; border-radius:50%; background:#ef4444; opacity:0.75; animation:ping 1.5s cubic-bezier(0,0,0.2,1) infinite;"></span>
            <span style="position:relative; display:inline-flex; width:12px; height:12px; border-radius:50%; background:#ef4444;"></span>
        </span>
    </button>

    <!-- 聊天面板 -->
    <div id="assistant-panel"
         style="position:fixed; bottom:24px; right:24px; z-index:9999; width:400px; max-width:calc(100vw - 48px); height:600px; overflow:hidden;
                border-radius:16px; border:1px solid rgba(255,255,255,0.08); background:rgba(15,15,26,0.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
                box-shadow:0 25px 50px -12px rgba(102,126,234,0.2); transition:all 0.5s ease; display:none; flex-direction:column;">

        <!-- 面板头部 -->
        <div style="display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid rgba(255,255,255,0.06); background:linear-gradient(to right, rgba(102,126,234,0.1), rgba(118,75,162,0.1));">
            <div style="display:flex; align-items:center; gap:12px;">
                <div style="width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,#667eea,#764ba2); display:flex; align-items:center; justify-content:center;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                </div>
                <div>
                    <h3 style="font-size:15px; font-weight:600; color:rgba(255,255,255,0.95); margin:0;">AI 学习助手</h3>
                    <p style="font-size:12px; color:rgba(255,255,255,0.45); margin:2px 0 0 0;">随时为你解答</p>
                </div>
            </div>
            <button onclick="toggleAssistant()" style="background:none; border:none; color:rgba(255,255,255,0.6); cursor:pointer; padding:6px; border-radius:8px; transition:all 0.2s; display:flex; align-items:center; justify-content:center;"
                    onmouseover="this.style.background='rgba(239,68,68,0.1)'; this.style.color='#ef4444'"
                    onmouseout="this.style.background='none'; this.style.color='rgba(255,255,255,0.6)'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <!-- 标签页切换 -->
        <div style="display:flex; border-bottom:1px solid rgba(255,255,255,0.06);">
            <button id="tab-chat-btn" onclick="switchTab('chat')" class="assistant-tab active"
                    style="flex:1; display:flex; align-items:center; justify-content:center; gap:8px; padding:14px 0; border:none; background:none; cursor:pointer; font-size:14px; font-weight:500; color:#667eea; border-bottom:2px solid #667eea; transition:all 0.3s;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                对话
            </button>
            <button id="tab-knowledge-btn" onclick="switchTab('knowledge')" class="assistant-tab"
                    style="flex:1; display:flex; align-items:center; justify-content:center; gap:8px; padding:14px 0; border:none; background:none; cursor:pointer; font-size:14px; font-weight:500; color:rgba(255,255,255,0.45); border-bottom:2px solid transparent; transition:all 0.3s;"
                    onmouseover="if(!this.classList.contains('active')) this.style.color='rgba(255,255,255,0.75)'"
                    onmouseout="if(!this.classList.contains('active')) this.style.color='rgba(255,255,255,0.45)'">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                知识图谱
            </button>
        </div>

        <!-- 对话内容区 -->
        <div id="tab-chat" class="tab-content" style="flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:16px;">
            <div class="msg-row" style="display:flex; justify-content:flex-start;">
                <div class="msg-bubble msg-assistant" style="max-width:85%; border-radius:16px; padding:12px 16px; font-size:14px; line-height:1.6; color:rgba(255,255,255,0.9); background:rgba(255,255,255,0.07);">
                    <pre style="white-space:pre-wrap;margin:0;font-family:inherit;font-size:inherit;">你好！我是 JellyStudy 的 AI 学习助手 🎓

我可以帮你解答学习问题、解释复杂概念、提供学习建议。有什么我可以帮助你的吗？</pre>
                </div>
            </div>
            <div id="chat-messages-container"></div>
        </div>

        <!-- 知识图谱内容区 -->
        <div id="tab-knowledge" class="tab-content" style="flex:1; display:none; flex-direction:column; padding:16px; overflow-y:auto;">
            <div style="text-align:center; margin-bottom:16px;">
                <div style="margin-bottom:12px; width:56px; height:56px; border-radius:14px; background:linear-gradient(135deg,rgba(102,126,234,0.2),rgba(118,75,162,0.2)); display:inline-flex; align-items:center; justify-content:center;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                </div>
                <h4 style="font-size:15px; font-weight:600; color:rgba(255,255,255,0.95); margin-bottom:4px;">知识图谱可视化</h4>
                <p style="font-size:12px; color:rgba(255,255,255,0.45); margin-bottom:12px;">基于你的浏览记录生成知识图谱</p>
                <a href="/assistant/knowledge-graph" target="_blank"
                   style="display:inline-flex; align-items:center; gap:6px; padding:10px 24px; border-radius:12px; border:none;
                          background:linear-gradient(135deg,#667eea,#764ba2); color:white; cursor:pointer; font-size:14px; font-weight:600;
                          text-decoration:none; transition:all 0.3s;"
                   onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 4px 15px rgba(102,126,234,0.4)'"
                   onmouseout="this.style.transform=''; this.style.boxShadow=''">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    进入图谱
                </a>
            </div>
            <!-- 最近浏览的知识点列表 -->
            <div id="recent-kp-list" style="margin-top:8px;">
                <h5 style="font-size:13px; color:rgba(255,255,255,0.6); margin-bottom:8px;">最近浏览的知识点</h5>
                <div id="recent-kp-items" style="display:flex; flex-direction:column; gap:6px;">
                    <p style="font-size:12px; color:rgba(255,255,255,0.35);">浏览问题后将自动记录</p>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div id="chat-input-area" style="border-top:1px solid rgba(255,255,255,0.06); padding:16px; display:flex; gap:10px;">
            <input type="text" id="user-input" placeholder="输入你的问题..."
                   onkeydown="handleKeyDown(event)"
                   style="flex:1; border-radius:12px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); padding:12px 16px; font-size:14px;
                          color:rgba(255,255,255,0.95); outline:none; transition:all 0.3s;"
                   onfocus="this.style.borderColor='rgba(102,126,234,0.5)'; this.style.boxShadow='0 0 0 3px rgba(102,126,234,0.15)'"
                   onblur="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.boxShadow='none'"/>
            <button id="send-btn" onclick="sendMessage()"
                    style="padding:12px 16px; border-radius:12px; border:none; background:linear-gradient(135deg,#667eea,#764ba2); color:white; cursor:pointer; font-size:14px; font-weight:600; transition:all 0.3s; display:flex; align-items:center; justify-content:center;"
                    onmouseover="this.style.opacity='0.9'"
                    onmouseout="this.style.opacity='1'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>
</div>

<style>
    /* AI 助手动画 */
    @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 20px rgba(102,126,234,0.3); }
        50% { box-shadow: 0 0 40px rgba(102,126,234,0.6); }
    }
    @keyframes bounceSubtle {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
    }
    @keyframes ping {
        75%, 100% { transform: scale(2); opacity: 0; }
    }
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* 消息气泡 */
    .msg-user {
        background: linear-gradient(135deg,#667eea,#764ba2) !important;
        color: white !important;
    }
    .msg-row {
        animation: fadeInUp 0.3s ease-out;
    }

    /* 滚动条 */
    #tab-chat::-webkit-scrollbar { width: 4px; }
    #tab-chat::-webkit-scrollbar-track { background: transparent; }
    #tab-chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* 输入框占位符 */
    #user-input::placeholder { color: rgba(255,255,255,0.35); }
</style>
