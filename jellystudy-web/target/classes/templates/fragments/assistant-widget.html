<!-- 智能助手悬浮窗组件 -->
<div id="ai-assistant-widget" th:fragment="assistant-widget">
    <!-- 悬浮按钮 -->
    <div id="assistant-toggle" onclick="toggleAssistant()" title="AI助手" style="width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 15px rgba(102,126,234,0.4);transition:all 0.3s ease;position:relative;overflow:hidden;">
        <img class="assistant-icon" th:src="@{/images/lgs.webp}" alt="AI助手" style="width:48px;height:48px;object-fit:contain;animation:bounce 2s infinite;">
        <div class="assistant-badge" id="assistant-badge" style="display: none;">0</div>
    </div>

    <!-- 主面板 -->
    <div id="assistant-panel" style="display: none;">
        <!-- 头部 -->
        <div class="panel-header">
            <div class="header-left">
                <span class="header-title">🤖 博识尊 - AI助手</span>
            </div>
            <div class="header-right">
                <button class="tab-btn active" onclick="switchTab('chat')" data-tab="chat">💬 对话</button>
                <button class="tab-btn" onclick="switchTab('knowledge')" data-tab="knowledge">📚 知识图谱</button>
                <button class="close-btn" onclick="toggleAssistant()">✕</button>
            </div>
        </div>

        <!-- 对话标签页 -->
        <div id="tab-chat" class="tab-content active">
            <div id="chat-messages" class="chat-messages">
                <div class="message assistant-message">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <p>你好！我是<strong>博识尊</strong>，JellyStudy的AI学习助手。我可以：</p>
                        <ul style="margin: 8px 0; padding-left: 20px;">
                            <li>回答学术和技术问题</li>
                            <li>解释复杂概念</li>
                            <li>提供学习建议</li>
                        </ul>
                        <p>有什么可以帮助你的吗？😊</p>
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <textarea id="user-input" placeholder="输入你的问题..."
                         onkeydown="handleKeyDown(event)" rows="2"></textarea>
                <button id="send-btn" onclick="sendMessage()">
                    <span class="send-text">发送</span>
                    <span class="send-loading" style="display: none;">⏳</span>
                </button>
            </div>
        </div>

        <!-- 知识图谱标签页 -->
        <div id="tab-knowledge" class="tab-content" style="display: none;">
            <div class="knowledge-header">
                <h4>📌 我感兴趣的知识点</h4>
                <div class="knowledge-actions">
                    <button class="action-btn primary" onclick="generateKnowledgeGraph()">
                        🗺️ 生成图谱
                    </button>
                    <button class="action-btn danger" onclick="clearAllInterests()">
                        🗑️ 清空列表
                    </button>
                </div>
            </div>

            <div id="interested-points-list" class="points-list">
                <div class="empty-state">
                    <p>📭 还没有标记任何知识点</p>
                    <p class="hint">在问题详情页点击"📌 标记感兴趣"按钮来添加</p>
                </div>
            </div>

            <div id="graph-container" class="graph-container" style="display: none;">
                <div class="graph-header">
                    <h4>🗺️ 知识图谱</h4>
                    <button class="close-graph-btn" onclick="closeGraph()">✕ 关闭</button>
                </div>
                <div id="graph-canvas" class="graph-canvas"></div>
            </div>
        </div>
    </div>
</div>
