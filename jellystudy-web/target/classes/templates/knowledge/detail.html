<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="layout :: head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识点详情 - JellyStudy</title>
</head>
<body>

<!-- Header Navigation -->
<div th:replace="layout :: header"></div>

<!-- ========== PAGE HERO ========== -->
<section class="page-hero">
    <div class="container">
        <a href="/knowledge/list" class="back-link">&larr; 返回知识点库</a>
        <h1 th:text="${knowledgePoint != null ? knowledgePoint.title : '知识点详情'}">知识点名称</h1>
        <p th:text="${knowledgePoint != null ? knowledgePoint.description : ''}">描述信息</p>
    </div>
</section>

<!-- ========== CONTENT AREA ========== -->
<section class="py-12">
    <div class="container">
        <div class="stats-grid" style="grid-template-columns:1fr; gap:2rem;">
            <style>@media(min-width:1024px){section .stats-grid[style*="grid-template-columns:1fr"]{grid-template-columns:2fr 1fr!important;}}</style>

            <!-- Main Content -->
            <div>

                <!-- Knowledge Detail Card -->
                <div class="card animate-slide-up" style="padding:32px; margin-bottom:2rem;">
                    <!-- Meta Info -->
                    <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:32px;">
                        <span class="tag" th:if="${knowledgePoint != null}" th:text="${knowledgePoint.category}">分类</span>
                        <span style="font-size:13px; color:var(--text-muted);">
                            创建时间: <strong style="color:var(--text-secondary);" th:text="${knowledgePoint != null ? #temporals.format(knowledgePoint.createTime, 'yyyy-MM-dd') : '--'}">--</strong>
                        </span>
                    </div>

                    <!-- Detail Content -->
                    <div class="prose" th:if="${knowledgePoint != null and knowledgePoint.description != null and knowledgePoint.description != ''}">
                        <p style="line-height:1.8; margin-bottom:1em; color:rgba(232,232,240,0.85);"
                           th:text="${knowledgePoint.description}">内容</p>
                    </div>

                    <div th:unless="${knowledgePoint != null and knowledgePoint.description != null and knowledgePoint.description != ''}"
                         style="color:var(--text-muted); text-align:center; padding:24px;">
                        暂无详细内容
                    </div>
                </div>

                <!-- Related Questions -->
                <div style="margin-bottom:2rem;">
                    <h3 style="font-size:1.5rem; font-weight:bold; color:var(--text-primary); margin-bottom:24px;">
                        💬 相关问题 (<span th:text="${questions != null ? questions.size() : 0}">0</span>)
                    </h3>

                    <div th:if="${questions != null and !questions.isEmpty()}">
                        <div th:each="q, iter : ${questions}"
                             class="card animate-slide-up"
                             style="margin-bottom:12px; padding:20px;"
                             th:style="'animation-delay:' + (${iter.index} * 0.08) + 's'">
                            <a th:href="@{/question/{id}(id=${q.id})}" style="text-decoration:none;color:inherit;display:block;">
                                <h4 style="font-weight:bold; color:var(--text-primary); margin-bottom:8px; transition:color 0.3s;"
                                    onmouseover="this.style.color='var(--color-primary)'"
                                    onmouseout="this.style.color='var(--text-primary)'"
                                    th:text="${q.title}">问题标题</h4>
                                <div style="display:flex; gap:16px; font-size:13px; color:var(--text-muted);">
                                    <span th:if="${q.author != null}" th:text="${'👤 ' + q.author}">作者</span>
                                    <span th:if="${q.createTime != null}" th:text="${'📅 ' + #temporals.format(q.createTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                                </div>
                            </a>
                        </div>
                    </div>

                    <div th:unless="${questions != null and !questions.isEmpty()}"
                         class="card text-center animate-slide-up"
                         style="padding:40px;">
                        <p style="color:var(--text-muted); font-size:16px;">暂无相关的问题</p>
                    </div>

                    <a href="/question/list"
                       style="display:block; margin-top:20px; text-align:center; color:var(--color-primary); font-weight:bold; transition:opacity 0.3s;"
                       onmouseover="this.style.opacity='0.8'"
                       onmouseout="this.style.opacity='1'">
                        查看所有相关问题 &rarr;
                    </a>
                </div>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar-sticky">
                <div class="side-actions">
                    <button class="sidebar-action-btn sidebar-action-btn-primary">❤️ 点赞</button>
                    <button class="sidebar-action-btn sidebar-action-btn-secondary">🔖 收藏</button>
                    <a th:if="${knowledgePoint != null}"
                       th:href="@{/knowledge/{id}/edit(id=${knowledgePoint.id})}"
                       class="sidebar-action-btn sidebar-action-btn-accent">
                        ✏️ 编辑
                    </a>

                    <!-- Statistics -->
                    <div class="sidebar-card">
                        <h4>📊 统计信息</h4>
                        <div style="display:flex; flex-direction:column; gap:12px; font-size:14px;">
                            <div style="display:flex; justify-content:space-between;">
                                <span style="color:var(--text-muted);">相关问题数</span>
                                <span style="font-weight:bold; color:var(--text-primary);" th:text="${questions != null ? questions.size() : 0}">0</span>
                            </div>
                            <div style="display:flex; justify-content:space-between;">
                                <span style="color:var(--text-muted);">浏览次数</span>
                                <span style="font-weight:bold; color:var(--text-primary);">1,234</span>
                            </div>
                            <div style="display:flex; justify-content:space-between;">
                                <span style="color:var(--text-muted);">收藏次数</span>
                                <span style="font-weight:bold; color:var(--text-primary);">89</span>
                            </div>
                        </div>
                    </div>

                    <!-- Delete -->
                    <form th:if="${knowledgePoint != null}"
                          th:action="@{/knowledge/{id}/delete(id=${knowledgePoint.id})}"
                          method="post"
                          onsubmit="return confirm('确定要删除这个知识点吗？');">
                        <button type="submit" class="sidebar-action-btn sidebar-action-btn-danger" style="width:100%;">🗑️ 删除知识点</button>
                    </form>
                </div>
            </aside>
        </div>
    </div>
</section>

</body>
</html>
