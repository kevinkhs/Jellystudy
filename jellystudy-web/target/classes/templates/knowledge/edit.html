<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="layout :: head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑知识点 - JellyStudy</title>
</head>
<body>

<!-- Header Navigation -->
<div th:replace="layout :: header"></div>

<!-- ========== PAGE HERO ========== -->
<section class="page-hero">
    <div class="container">
        <a th:href="@{/knowledge/{id}(id=${knowledgePoint.id})}" class="back-link">&larr; 返回知识点详情</a>
        <h1>编辑知识点</h1>
    </div>
</section>

<!-- ========== EDIT FORM ========== -->
<section class="py-12">
    <div class="container" style="max-width:800px;">
        <div class="card animate-slide-up" style="padding:32px;">
            <form th:action="@{/knowledge/{id}/update(id=${knowledgePoint.id})}" method="post">
                <div class="form-group">
                    <label class="form-label">知识点标题</label>
                    <input type="text" name="title" class="form-control" required
                           th:value="${knowledgePoint.title}" placeholder="输入知识点标题"/>
                </div>
                <div class="form-group">
                    <label class="form-label">分类</label>
                    <select name="category" class="form-control" required>
                        <option value="后端开发" th:selected="${knowledgePoint.category == '后端开发'}">后端开发</option>
                        <option value="前端开发" th:selected="${knowledgePoint.category == '前端开发'}">前端开发</option>
                        <option value="数据库" th:selected="${knowledgePoint.category == '数据库'}">数据库</option>
                        <option value="DevOps" th:selected="${knowledgePoint.category == 'DevOps'}">DevOps</option>
                        <option value="算法" th:selected="${knowledgePoint.category == '算法'}">算法</option>
                        <option value="其他" th:selected="${knowledgePoint.category == '其他'}">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea name="description" class="form-control form-textarea-lg"
                              th:text="${knowledgePoint.description}" placeholder="输入知识点描述..."></textarea>
                </div>
                <div style="display:flex; gap:12px; margin-top:24px;">
                    <button type="submit" class="btn btn-primary btn-lg">保存修改</button>
                    <a th:href="@{/knowledge/{id}(id=${knowledgePoint.id})}" class="btn btn-outline btn-lg">取消</a>
                </div>
            </form>
        </div>
    </div>
</section>

</body>
</html>
