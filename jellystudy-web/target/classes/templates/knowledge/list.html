<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="layout :: head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识点库 - JellyStudy</title>
</head>
<body>

<!-- Header Navigation -->
<div th:replace="layout :: header"></div>

<!-- ========== PAGE HERO ========== -->
<section class="page-hero">
    <div class="container">
        <div class="animate-slide-up">
            <h1>知识点库</h1>
            <p>系统地学习各个领域的知识点，提升你的技能</p>
        </div>
    </div>
</section>

<!-- ========== FILTER BAR ========== -->
<section class="filter-bar">
    <div class="container">
        <div class="filter-bar-inner">
            <!-- Search -->
            <div class="search-wrapper" style="max-width:400px;">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="knowledgeSearch" class="search-bar" placeholder="搜索知识点..."
                       oninput="filterKnowledge()"/>
            </div>

            <!-- Category Filters -->
            <div class="category-filters" id="categoryFilters">
                <button class="category-filter-btn active" onclick="filterByCategory('', this)">全部</button>
                <button th:each="cat : ${categories}" class="category-filter-btn" th:text="${cat}"
                        th:onclick="'filterByCategory(\'' + ${cat} + '\', this)'">分类</button>
            </div>
        </div>
    </div>
</section>

<!-- ========== KNOWLEDGE GRID ========== -->
<section class="py-12">
    <div class="container">
        <!-- 空状态 -->
        <div th:if="${knowledgePoints == null or knowledgePoints.isEmpty()}" class="empty-state">
            没有找到匹配的知识点
        </div>

        <!-- 知识点卡片网格 -->
        <div th:if="${knowledgePoints != null and !knowledgePoints.isEmpty()}" class="knowledge-grid">
            <a th:each="kp, iter : ${knowledgePoints}"
               th:href="@{/knowledge/{id}(id=${kp.id})}"
               class="animate-slide-up"
               th:style="'animation-delay:' + (${iter.index} * 0.1) + 's'"
               style="text-decoration:none;color:inherit;display:block;"
               th:attr="data-category=${kp.category}">
                <div class="knowledge-card">
                    <div class="knowledge-card-bar"></div>
                    <div class="knowledge-card-body">
                        <div class="knowledge-card-header">
                            <h3 class="knowledge-card-title" th:text="${kp.title}">标题</h3>
                            <span style="font-size:28px;">📚</span>
                        </div>

                        <span class="tag" style="margin-bottom:16px;" th:text="${kp.category}">分类</span>

                        <p class="knowledge-card-desc" th:text="${kp.description}">描述信息...</p>

                        <div class="knowledge-card-footer">
                            <div style="display:flex; gap:16px; flex-wrap:wrap;">
                                <span>💬 <span th:text="${kp.questionCount != null ? kp.questionCount : 0}">0</span> 个问题</span>
                            </div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>
</section>

<!-- ========== CTA ========== -->
<section class="py-12" style="background:var(--bg-card-solid); border-top:1px solid var(--border-color);">
    <div class="container text-center">
        <h2 style="font-size:1.75rem; font-weight:bold; color:var(--text-primary); margin-bottom:12px;">想要分享你的知识？</h2>
        <p style="color:var(--text-muted); margin-bottom:2rem; font-size:1.125rem;">创建新的知识点，帮助更多的学习者</p>
        <a href="/knowledge/create" class="btn btn-primary btn-lg" style="padding:14px 32px; border-radius:12px;">+ 创建知识点</a>
    </div>
</section>

<script>
    let currentCategory = '';

    function filterByCategory(cat, btn) {
        currentCategory = cat;
        // Update active button
        document.querySelectorAll('.category-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterKnowledge();
    }

    function filterKnowledge() {
        const query = (document.getElementById('knowledgeSearch')?.value || '').toLowerCase();
        const cards = document.querySelectorAll('.knowledge-grid a[data-category]');
        cards.forEach(card => {
            const category = card.getAttribute('data-category') || '';
            const text = card.textContent?.toLowerCase() || '';
            const matchCat = !currentCategory || category === currentCategory;
            const matchSearch = !query || text.includes(query);
            card.style.display = (matchCat && matchSearch) ? '' : 'none';
        });
    }
</script>

</body>
</html>
