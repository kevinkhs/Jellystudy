server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: jellystudy-web
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML5
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
      timeout: 10000ms
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

dubbo:
  application:
    name: jellystudy-web-${INSTANCE_NAME:default}
  registry:
    address: nacos://${NACOS_HOST:nacos}:${NACOS_PORT:8848}
  consumer:
    timeout: 10000
    retries: 0
    check: false
