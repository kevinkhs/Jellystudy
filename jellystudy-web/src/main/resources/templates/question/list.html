<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="layout :: head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问题列表 - JellyStudy</title>
</head>
<body>

<!-- ========== PAGE HERO — exact v0 match ========== -->
<section class="page-hero">
    <div class="container animate-slide-up">
        <h1>问题列表</h1>
        <p>汇聚智慧，解答疑惑 — 浏览社区中的热点问题</p>
    </div>
</section>

<!-- ========== CONTENT AREA ========== -->
<section class="section-padding">
    <div class="container">
        <div class="two-col-layout">

            <!-- Sidebar: Filters + Create Button -->
            <aside style="position:sticky; top:80px; align-self:start;">
                <div class="card" style="padding:24px;">
                    <h3 style="font-weight:bold; font-size:18px; color:var(--text-primary); margin-bottom:16px;">筛选标签</h3>

                    <button class="filter-tag active" onclick="window.location.href='/question/list'">全部问题</button>
                    <!-- Additional filter tags can be added dynamically -->

                    <a href="/question/create" class="btn btn-primary btn-block" style="margin-top:24px;">+ 提出问题</a>
                </div>
            </aside>

            <!-- Main: Question List -->
            <div>
                <div th:if="${questions != null and !questions.isEmpty()}">
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        <div class="question-item animate-slide-up" th:each="q, iter : ${questions}" th:style="'animation-delay:' + (${iter.index} * 0.08) + 's'">
                            <a th:href="@{/question/{id}(id=${q.id})}" style="text-decoration:none;color:inherit;display:block;">
                                <div class="question-item-inner">
                                    <div class="question-item-content">
                                        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:4px;">
                                            <h3 class="question-item-title" style="font-size:18px;" th:text="${q.title}">问题标题</h3>
                                            <span class="tag" style="flex-shrink:0;" th:if="${q.knowledgePointTitle != null}" th:text="${q.knowledgePointTitle}">知识点</span>
                                        </div>
                                        <p style="color:var(--text-muted); font-size:14px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;" th:if="${q.content != null}" th:text="${q.content}">问题描述...</p>
                                        <div class="question-meta">
                                            <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> <span th:text="${q.author}">作者</span></span>
                                            <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> <span th:text="${q.createTime != null ? #temporals.format(q.createTime, 'yyyy-MM-dd HH:mm') : ''}">时间</span></span>
                                            <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> <span th:text="${q.viewCount}">0</span> 浏览</span>
                                            <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> <span th:text="${q.answerCount}">0</span> 回答</span>
                                            <span class="meta-item" style="color:var(--color-danger);"><svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> <span th:text="${q.likeCount}">0</span></span>
                                        </div>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <div class="pagination" th:if="${totalPages > 1}">
                        <a th:if="${currentPage > 0}" th:href="@{/question/list(page=${currentPage - 1})}" class="page-link">&larr; 上一页</a>
                        <span class="page-info">第 <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span> 页</span>
                        <a th:if="${currentPage < totalPages - 1}" th:href="@{/question/list(page=${currentPage + 1})}" class="page-link">下一页 &rarr;</a>
                    </div>
                </div>

                <div th:unless="${questions != null and !questions.isEmpty()}" class="empty-state">
                    暂无相关问题
                </div>
            </div>

        </div>
    </div>
</section>

<!-- AI Assistant Widget -->
<div th:replace="fragments/assistant-widget :: assistant-widget"></div>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script th:src="@{/js/assistant.js}"></script>
</body>
</html>
