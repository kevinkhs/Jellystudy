<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="layout :: head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推荐问题 - JellyStudy</title>
</head>
<body>

<!-- Header Navigation -->
<div th:replace="layout :: header"></div>

<!-- ========== PAGE HERO ========== -->
<section class="page-hero">
    <div class="container">
        <h1>推荐问题</h1>
        <p>根据你的兴趣为你精选的问题</p>
    </div>
</section>

<!-- ========== CONTENT ========== -->
<section class="py-12">
    <div class="container">
        <div th:if="${questions != null and !questions.isEmpty()}">
            <div th:each="q, iter : ${questions}"
                 class="card animate-slide-up"
                 style="margin-bottom:16px; padding:24px;"
                 th:style="'animation-delay:' + (${iter.index} * 0.08) + 's'">
                <a th:href="@{/question/{id}(id=${q.id})}" style="text-decoration:none;color:inherit;display:block;">
                    <h4 style="font-weight:bold; color:var(--text-primary); margin-bottom:12px; transition:color 0.3s;"
                        onmouseover="this.style.color='var(--color-primary)'"
                        onmouseout="this.style.color='var(--text-primary)'"
                        th:text="${q.title}">问题标题</h4>
                    <div style="display:flex; gap:16px; flex-wrap:wrap; font-size:13px; color:var(--text-muted);">
                        <span class="tag" th:if="${q.knowledgePointTitle != null}" th:text="${q.knowledgePointTitle}">知识点</span>
                        <span th:if="${q.author != null}" th:text="${'👤 ' + q.author}">作者</span>
                        <span th:if="${q.createTime != null}" th:text="${'📅 ' + #temporals.format(q.createTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                        <span>👁️<span th:text="${q.viewCount != null ? q.viewCount : 0}">0</span></span>
                        <span>❤️<span style="color:var(--color-danger);" th:text="${q.likeCount != null ? q.likeCount : 0}">0</span></span>
                        <span>💬<span th:text="${q.answerCount != null ? q.answerCount : 0}">0</span></span>
                    </div>
                </a>
            </div>
        </div>
        <div th:unless="${questions != null and !questions.isEmpty()}">
            <div class="card animate-slide-up" style="padding:48px; text-align:center;">
                <p style="color:var(--text-muted); font-size:18px;">暂无推荐问题</p>
            </div>
        </div>
    </div>
</section>

</body>
</html>
