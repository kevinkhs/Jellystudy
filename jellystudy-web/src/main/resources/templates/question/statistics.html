<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="layout :: head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计信息 - JellyStudy</title>
</head>
<body>

<!-- Header Navigation -->
<div th:replace="layout :: header"></div>

<!-- ========== PAGE HERO ========== -->
<section class="page-hero">
    <div class="container">
        <div class="animate-slide-up">
            <h1>平台统计信息</h1>
            <p>了解平台的发展趋势和热点内容</p>
        </div>
    </div>
</section>

<!-- ========== STATS OVERVIEW ========== -->
<section style="background:var(--bg-card-solid); border-bottom:1px solid var(--border-color); padding:3rem 0;">
    <div class="container">
        <div class="stats-overview-grid">
            <div class="stat-overview-card animate-slide-up" th:style="'animation-delay:0s'">
                <div class="stat-overview-icon">📝</div>
                <div class="stat-overview-label">总问题数</div>
                <div class="stat-overview-value" th:text="${totalQuestions != null ? totalQuestions : 0}">0</div>
            </div>
            <div class="stat-overview-card animate-slide-up" th:style="'animation-delay:0.1s'">
                <div class="stat-overview-icon">💬</div>
                <div class="stat-overview-label">总回答数</div>
                <div class="stat-overview-value" style="color:#f093fb;" th:text="${totalAnswers != null ? totalAnswers : 0}">0</div>
            </div>
            <div class="stat-overview-card animate-slide-up" th:style="'animation-delay:0.2s'">
                <div class="stat-overview-icon">💭</div>
                <div class="stat-overview-label">评论总数</div>
                <div class="stat-overview-value" style="color:#4facfe;" th:text="${totalComments != null ? totalComments : 0}">0</div>
            </div>
            <div class="stat-overview-card animate-slide-up" th:style="'animation-delay:0.3s'">
                <div class="stat-overview-icon">❤️</div>
                <div class="stat-overview-label">点赞总数</div>
                <div class="stat-overview-value" style="color:#43e97b;" th:text="${totalLikes != null ? totalLikes : 0}">0</div>
            </div>
        </div>
    </div>
</section>

<!-- ========== CHARTS & TOP LISTS ========== -->
<section class="py-12">
    <div class="container">
        <div class="stats-grid" style="grid-template-columns:1fr; gap:2rem;">
            <style>@media(min-width:1024px){section .stats-grid[style*="grid-template-columns:1fr"]{grid-template-columns:1fr 1fr!important;}}</style>

            <!-- Hot Questions TOP 5 -->
            <div class="chart-card animate-slide-up">
                <h2>🔥 热门问题 TOP 5</h2>
                <div th:if="${hotQuestions != null and !hotQuestions.isEmpty()}">
                    <div th:each="q, idx : ${hotQuestions}"
                         style="padding:16px 0; border-bottom:1px solid var(--border-color); transition:all 0.3s;"
                         onmouseover="this.style.background='rgba(102,126,234,0.03)'"
                         onmouseout="this.style.background='transparent'">
                        <a th:href="@{/question/{id}(id=${q.id})}" style="text-decoration:none;color:inherit;">
                            <div style="font-size:16px; font-weight:600; color:var(--text-primary); margin-bottom:8px;" th:text="${q.title}">问题标题</div>
                            <div style="display:flex; gap:16px; font-size:13px; color:var(--text-muted);">
                                <span>👁️ <span th:text="${q.viewCount}">0</span> 浏览</span>
                                <span>💬 <span th:text="${q.answerCount}">0</span> 回答</span>
                                <span style="color:var(--color-danger); font-weight:600;">❤️ <span th:text="${q.likeCount}">0</span> 赞</span>
                            </div>
                        </a>
                    </div>
                </div>
                <div th:unless="${hotQuestions != null and !hotQuestions.isEmpty()}"
                     style="text-align:center; padding:32px; color:var(--text-muted);">
                    暂无数据
                </div>
            </div>

            <!-- Top Answers TOP 5 -->
            <div class="chart-card animate-slide-up" th:style="'animation-delay:0.1s'">
                <h2>⭐ 高赞回答 TOP 5</h2>
                <div th:if="${topAnswers != null and !topAnswers.isEmpty()}">
                    <div th:each="ans, idx : ${topAnswers}"
                         style="padding:16px 0; border-bottom:1px solid var(--border-color); transition:all 0.3s;"
                         onmouseover="this.style.background='rgba(102,126,234,0.03)'"
                         onmouseout="this.style.background='transparent'">
                        <div style="font-size:15px; font-weight:500; color:var(--text-primary); margin-bottom:8px; line-height:1.5;"
                             th:text="${ans.content != null and ans.content.length() > 80 ? ans.content.substring(0, 80) + '...' : ans.content}">回答内容</div>
                        <div style="display:flex; align-items:center; gap:12px; font-size:13px;">
                            <span class="tag" th:text="${ans.author}">作者</span>
                            <span style="color:var(--color-danger); font-weight:600;">❤️ <span th:text="${ans.likeCount}">0</span> 赞</span>
                        </div>
                    </div>
                </div>
                <div th:unless="${topAnswers != null and !topAnswers.isEmpty()}"
                     style="text-align:center; padding:32px; color:var(--text-muted);">
                    暂无数据
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
