<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="layout :: head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提问 - JellyStudy</title>
</head>
<body>

<!-- Header Navigation -->
<div th:replace="layout :: header"></div>

<!-- ========== PAGE HERO ========== -->
<section class="page-hero">
    <div class="container">
        <div class="animate-slide-up">
            <h1>提出新问题</h1>
            <p>分享你的疑惑，获得社区的帮助 - 清晰的问题描述能获得更好的回答</p>
        </div>
    </div>
</section>

<!-- ========== FORM AREA ========== -->
<section class="py-12">
    <div class="container">
        <div style="max-width:780px; margin:0 auto;">

            <!-- 提示信息 -->
            <div class="tip-card animate-slide-up">
                <h3>💡 提问建议</h3>
                <ul>
                    <li>✓ 使用清晰、简洁的语言描述你的问题</li>
                    <li>✓ 提供足够的背景信息和代码示例</li>
                    <li>✓ 描述你已经尝试过的方法</li>
                    <li>✓ 包含任何错误信息或意外行为</li>
                </ul>
            </div>

            <!-- 表单 -->
            <form action="/question/create" method="post" class="card animate-slide-up" style="padding:32px;">

                <!-- 问题标题 -->
                <div class="form-group">
                    <label class="form-label">问题标题 *</label>
                    <input type="text" name="title" class="form-input-lg" required
                           placeholder="用一句话总结你的问题，例如：如何在 React 中优化性能？"
                           maxlength="200"/>
                    <span class="form-char-count">最多 200 字符</span>
                </div>

                <!-- 问题详情 -->
                <div class="form-group">
                    <label class="form-label">问题详情 *</label>
                    <textarea name="content" class="form-textarea-lg" required
                              placeholder="详细描述你的问题，包括：&#10;- 你想要达到什么目的&#10;- 目前遇到了什么问题&#10;- 你已经尝试过的方法&#10;- 任何相关的代码片段"
                              rows="8"></textarea>
                </div>

                <!-- 知识点选择 -->
                <div class="form-group">
                    <label class="form-label">选择相关知识点 *</label>
                    <select name="knowledgePointId" class="form-select-lg" required>
                        <option value="">-- 请选择知识点 --</option>
                        <option th:each="kp : ${knowledgePoints}"
                                th:value="${kp.id}"
                                th:text="${kp.title + ' (' + kp.category + ')'}">知识点</option>
                    </select>
                </div>

                <!-- 昵称 -->
                <div class="form-group">
                    <label class="form-label">你的昵称 *</label>
                    <input type="text" name="author" class="form-input-lg" required
                           placeholder="请输入你的昵称（不能超过 50 个字符）"
                           maxlength="50"/>
                </div>

                <!-- 按钮 -->
                <div class="btn-group" style="margin-top:8px;">
                    <button type="submit" class="btn btn-primary btn-block btn-lg">发布问题</button>
                    <a href="/question/list" class="btn btn-outline btn-block btn-lg">取消</a>
                </div>
            </form>
        </div>
    </div>
</section>

</body>
</html>
