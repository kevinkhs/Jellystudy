<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="layout :: head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑问题 - JellyStudy</title>
</head>
<body>

<!-- Header Navigation -->
<div th:replace="layout :: header"></div>

<!-- ========== PAGE HERO ========== -->
<section class="page-hero">
    <div class="container">
        <a th:href="@{/question/{id}(id=${question.id})}" class="back-link">&larr; 返回问题详情</a>
        <h1>编辑问题</h1>
    </div>
</section>

<!-- ========== EDIT FORM ========== -->
<section class="py-12">
    <div class="container" style="max-width:800px;">
        <div class="card animate-slide-up" style="padding:32px;">
            <form th:action="@{/question/{id}/update(id=${question.id})}" method="post">
                <div class="form-group">
                    <label class="form-label">问题标题</label>
                    <input type="text" name="title" class="form-control" required
                           th:value="${question.title}" placeholder="输入问题标题"/>
                </div>
                <div class="form-group">
                    <label class="form-label">问题详情</label>
                    <textarea name="content" class="form-control form-textarea-lg" required
                              th:text="${question.content}" placeholder="详细描述你的问题..."></textarea>
                </div>
                <div style="display:flex; gap:12px; margin-top:24px;">
                    <button type="submit" class="btn btn-primary btn-lg">保存修改</button>
                    <a th:href="@{/question/{id}(id=${question.id})}" class="btn btn-outline btn-lg">取消</a>
                </div>
            </form>
        </div>
    </div>
</section>

</body>
</html>
