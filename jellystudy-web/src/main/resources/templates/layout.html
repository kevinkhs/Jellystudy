<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JellyStudy 博识尊 - AI 智能学习平台</title>
    <meta name="description" content="让知识像果冻一样清晰透明。AI 驱动的智能学习平台，提供题目练习、AI 智能问答、知识图谱可视化和兴趣追踪功能。">
    <meta name="theme-color" content="#667eea">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>
    <!-- Background Grid Pattern -->
    <div class="bg-grid-pattern"></div>

    <div class="relative min-h-screen flex flex-col">

        <!-- ========== HEADER — exact v0 design ========== -->
        <header class="header" th:fragment="header">
            <div class="header-inner">
                <!-- Logo -->
                <a href="/" class="header-logo">
                    <div class="header-logo-icon">
                        <span>J</span>
                        <div class="header-logo-glow"></div>
                    </div>
                    <div class="header-logo-text">
                        <span class="brand-name">JellyStudy</span>
                        <span class="brand-sub">博识尊</span>
                    </div>
                </a>

                <!-- Desktop Navigation -->
                <nav class="nav-desktop">
                    <a href="/" class="nav-link">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        首页
                    </a>
                    <a href="/question/list" class="nav-link">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                        问题列表
                    </a>
                    <a href="/question/create" class="nav-link">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        提问
                    </a>
                    <a href="/knowledge/list" class="nav-link">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                        知识点管理
                    </a>
                    <a href="/question/statistics" class="nav-link">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                        统计信息
                    </a>
                </nav>

                <!-- Actions + Mobile Menu Button -->
                <div class="header-actions">
                    <button class="btn-outline-header">登录</button>
                    <button class="btn-primary-header">开始使用</button>
                    <button class="mobile-menu-btn" onclick="toggleMobileNav()" aria-label="菜单">
                        <svg id="mobile-menu-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                        <svg id="mobile-menu-close" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            </div>

            <!-- Mobile Navigation -->
            <div id="mobile-nav" class="mobile-nav">
                <nav class="mobile-nav-links">
                    <a href="/" class="mobile-nav-link" onclick="toggleMobileNav()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        首页
                    </a>
                    <a href="/question/list" class="mobile-nav-link" onclick="toggleMobileNav()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                        问题列表
                    </a>
                    <a href="/question/create" class="mobile-nav-link" onclick="toggleMobileNav()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        提问
                    </a>
                    <a href="/knowledge/list" class="mobile-nav-link" onclick="toggleMobileNav()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                        知识点管理
                    </a>
                    <a href="/question/statistics" class="mobile-nav-link" onclick="toggleMobileNav()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                        统计信息
                    </a>
                </nav>
            </div>
        </header>

        <!-- ========== MAIN CONTENT ========== -->
        <main class="flex-1 relative">
            <!-- Content replaced by child templates -->
        </main>

        <!-- ========== FOOTER — exact v0 design ========== -->
        <footer class="footer" th:fragment="footer">
            <div class="container">
                <div class="footer-grid">
                    <!-- Brand Column -->
                    <div>
                        <div class="footer-brand-logo">
                            <div class="header-logo-icon" style="width:40px;height:40px;font-size:18px;">J</div>
                            <div>
                                <span class="footer-brand-name">JellyStudy</span>
                                <span style="margin-left:8px;font-size:14px;color:var(--text-muted);">博识尊</span>
                            </div>
                        </div>
                        <p class="footer-desc">让知识像果冻一样清晰透明。<br>AI 驱动的智能学习平台。</p>
                    </div>

                    <!-- 功能 Links -->
                    <div>
                        <h4 class="footer-heading">功能</h4>
                        <ul class="footer-links">
                            <li><a href="/question/list">问题列表</a></li>
                            <li><a href="/knowledge/list">知识点管理</a></li>
                            <li><a href="#">AI 问答</a></li>
                            <li><a href="/question/statistics">统计信息</a></li>
                        </ul>
                    </div>

                    <!-- 资源 Links -->
                    <div>
                        <h4 class="footer-heading">资源</h4>
                        <ul class="footer-links">
                            <li><a href="#">帮助中心</a></li>
                            <li><a href="#">API 文档</a></li>
                            <li><a href="#">更新日志</a></li>
                            <li><a href="#">社区</a></li>
                        </ul>
                    </div>

                    <!-- 关于 Links -->
                    <div>
                        <h4 class="footer-heading">关于</h4>
                        <ul class="footer-links">
                            <li><a href="#">关于我们</a></li>
                            <li><a href="#">隐私政策</a></li>
                            <li><a href="#">服务条款</a></li>
                            <li><a href="#">联系我们</a></li>
                        </ul>
                    </div>
                </div>

                <!-- Bottom Bar -->
                <div class="footer-bottom">
                    <p class="footer-copyright">&copy; 2026 JellyStudy 博识尊. All rights reserved.</p>
                    <div class="footer-social">
                        <a href="#" aria-label="GitHub">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        </a>
                    </div>
                </div>
            </div>
        </footer>

    </div><!-- /.relative -->

    <!-- AI Assistant Widget -->
    <div th:replace="fragments/assistant-widget :: assistant-widget"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script th:src="@{/js/assistant.js}"></script>

    <script>
        function toggleMobileNav() {
            var nav = document.getElementById('mobile-nav');
            var openIcon = document.getElementById('mobile-menu-open');
            var closeIcon = document.getElementById('mobile-menu-close');
            if (nav.classList.contains('open')) {
                nav.classList.remove('open');
                openIcon.style.display = '';
                closeIcon.style.display = 'none';
            } else {
                nav.classList.add('open');
                openIcon.style.display = 'none';
                closeIcon.style.display = '';
            }
        }
    </script>

</body>
</html>
