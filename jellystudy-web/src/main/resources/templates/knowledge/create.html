<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="layout :: head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建知识点 - JellyStudy</title>
</head>
<body>

<!-- Header Navigation -->
<div th:replace="layout :: header"></div>

<!-- ========== PAGE HERO ========== -->
<section class="page-hero">
    <div class="container">
        <div class="animate-slide-up">
            <h1>创建知识点</h1>
            <p>分享你的知识和经验，帮助更多的学习者成长</p>
        </div>
    </div>
</section>

<!-- ========== FORM AREA ========== -->
<section class="py-12">
    <div class="container">
        <div style="max-width:780px; margin:0 auto;">

            <!-- 提示信息 -->
            <div class="tip-card animate-slide-up">
                <h3>💡 创建建议</h3>
                <ul>
                    <li>✓ 选择一个明确的知识点主题</li>
                    <li>✓ 提供清晰详尽的描述</li>
                    <li>✓ 包含实际的代码示例和最佳实践</li>
                    <li>✓ 标记相关的知识点和主题</li>
                </ul>
            </div>

            <!-- 表单 -->
            <form action="/knowledge/create" method="post" class="card animate-slide-up" style="padding:32px;">

                <!-- 标题 -->
                <div class="form-group">
                    <label class="form-label">知识点标题 *</label>
                    <input type="text" name="title" class="form-input-lg" required
                           placeholder="例如：React Hooks 深入理解"
                           maxlength="100"/>
                    <span class="form-char-count">最多 100 字符</span>
                </div>

                <!-- 分类选择 -->
                <div class="form-group">
                    <label class="form-label">知识点分类 *</label>
                    <select name="category" class="form-select-lg" required>
                        <option value="">-- 请选择分类 --</option>
                        <option value="后端开发">后端开发</option>
                        <option value="前端开发">前端开发</option>
                        <option value="数据库">数据库</option>
                        <option value="DevOps">DevOps</option>
                        <option value="算法">算法</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <!-- 描述 -->
                <div class="form-group">
                    <label class="form-label">知识点描述 *</label>
                    <textarea name="description" class="form-textarea-lg"
                              placeholder="简要描述这个知识点的核心内容和重要性"
                              rows="4" maxlength="500"></textarea>
                    <span class="form-char-count">最多 500 字符</span>
                </div>

                <!-- 按钮 -->
                <div class="btn-group" style="margin-top:8px;">
                    <button type="submit" class="btn btn-primary btn-block btn-lg">创建知识点</button>
                    <a href="/knowledge/list" class="btn btn-outline btn-block btn-lg">取消</a>
                </div>
            </form>
        </div>
    </div>
</section>

</body>
</html>
