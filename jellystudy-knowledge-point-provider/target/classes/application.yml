server:
  port: 8081

spring:
  application:
    name: jellystudy-knowledge-point-provider
  data:
    mongodb:
      uri: mongodb://localhost:27017/jellystudy
      auto-index-creation: true
  zipkin:
    base-url: http://localhost:9411
    enabled: true
  sleuth:
    sampler:
      probability: 1.0

dubbo:
  application:
    name: jellystudy-knowledge-point-provider
  protocol:
    name: dubbo
    port: 20881
  registry:
    address: nacos://localhost:8848
  scan:
    base-packages: com.jellystudy.provider.service
  provider:
    timeout: 5000
    retries: 0
